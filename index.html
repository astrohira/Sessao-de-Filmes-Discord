<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NedsCine - Agenda de Filmes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="toast-container"></div>

    <div class="container">
        <header>
            <h1>NedsCine</h1>
            <p>Agenda oficial do grupo</p>
        </header>

        <section class="form-container">
            <div class="input-group">
                <input type="text" id="movieTitle" placeholder="Nome do Filme">
                <input type="datetime-local" id="movieDate">
                <button onclick="addMovie()" class="btn-add">Agendar Sessão</button>
            </div>
        </section>

        <div id="movieList" class="grid-movies"></div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
